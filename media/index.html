<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline' https://cdnjs.cloudflare.com; script-src {{cspSource}} 'unsafe-inline' https://cdnjs.cloudflare.com;"
    />
    <title>ClarifAI</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <link rel="stylesheet" href="{{stylesUri}}" />
  </head>
  <body>
    <div class="container">
      <!-- Provider Section -->
      <div class="section provider-section">
        <label for="modelSelect">Select Model</label>
        <select id="modelSelect">
          <option value="">Loading models...</option>
        </select>
        <button class="refresh-button" id="refreshModels">
          Refresh Models
        </button>
      </div>

      <!-- Add Custom Provider Section -->
      <div class="section collapsible-section">
        <div class="collapsible-header" id="addProviderToggle">
          <span class="collapsible-icon" id="add-provider-icon">▶</span>
          <span>Add Custom Model</span>
        </div>
        <div class="collapsible-content collapsed" id="addProviderSection">
          <div class="form-group">
            <label for="providerName">Name</label>
            <input
              type="text"
              id="providerName"
              placeholder="e.g., OpenAI GPT-4"
            />
          </div>
          <div class="form-group">
            <label for="providerUrl">API URL</label>
            <input
              type="text"
              id="providerUrl"
              placeholder="e.g., https://api.openai.com/v1"
            />
          </div>
          <div class="form-group">
            <label for="providerModel">Model Name</label>
            <input
              type="text"
            id="providerModel"
              placeholder="e.g., gpt-4, gpt-3.5-turbo"
            />
          </div>
          <div class="form-group">
            <label for="providerApiKey"
              >API Key <span class="hint">(optional)</span></label
            >
            <input
              type="password"
              id="providerApiKey"
              placeholder="sk-..."
            />
          </div>
          <button class="secondary-button" id="addProviderButton">
            Add Model
          </button>
          <div id="addProviderError" class="error-message hidden"></div>
        </div>
      </div>

      <!-- Analysis Mode Section -->
      <div class="section mode-selector">
        <label class="mode-selector-label">Analysis Mode</label>
        <div class="mode-options">
          <div class="mode-option">
            <input
              type="radio"
              id="modeExplain"
              name="mode"
              value="explain"
              checked
            />
            <label for="modeExplain">Explain Code</label>
          </div>
          <div class="mode-option">
            <input
              type="radio"
              id="modeEnhance"
              name="mode"
              value="enhance"
            />
            <label for="modeEnhance">Suggest Enhancements</label>
          </div>
        </div>
      </div>

      <!-- Analyze Button -->
      <div class="section">
        <button id="explainButton">Analyze Selected Code</button>
      </div>

      <!-- Content Area -->
      <div id="content"></div>
    </div>

    <!-- Templates -->
    <template id="tpl-empty-state">
      <div class="empty-state"></div>
    </template>

    <template id="tpl-loading">
      <div class="loading">
        <div class="spinner"></div>
        <span>Analyzing code...</span>
      </div>
    </template>

    <template id="tpl-error">
      <div class="error"></div>
    </template>

    <template id="tpl-code-collapsible">
      <div class="collapsible">
        <div class="collapsible-header" data-section="code-section">
          <div class="collapsible-title">
            <span class="collapsible-icon" id="code-section-icon">▼</span>
            <span data-slot="label"></span>
          </div>
        </div>
        <div class="collapsible-content" id="code-section-content">
          <pre><code data-slot="code"></code></pre>
        </div>
      </div>
    </template>

    <template id="tpl-explanation-collapsible">
      <div class="collapsible" id="explanation-collapsible">
        <div class="collapsible-header" data-section="explanation-section">
          <div class="collapsible-title">
            <span class="collapsible-icon" id="explanation-section-icon"
              >▼</span
            >
            <span>Analysis Result</span>
          </div>
        </div>
        <div class="collapsible-content" id="explanation-section-content">
          <div class="explanation" id="explanation-text"></div>
        </div>
      </div>
    </template>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="{{scriptUri}}"></script>
  </body>
</html>
